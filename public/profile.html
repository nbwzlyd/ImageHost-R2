<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人资料 - NBVIL 图床</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="common.js" defer></script>
</head>
<body class="font-sans flex flex-col min-h-screen" style="background: linear-gradient(135deg, #1a1a2e 0%, #2d1b4e 30%, #6b2d5c 60%, #a8546e 85%, #d4827a 100%); background-attachment: fixed;">

  <!-- 右上角登录状态 -->
  <header class="fixed top-0 right-0 p-4 z-50">
    <div id="user-status" class="flex items-center space-x-2">
      <button id="login-register-btn" class="bg-white bg-opacity-20 hover:bg-opacity-30 text-white px-3 py-1.5 rounded text-sm transition duration-300">登录/注册</button>
      <div id="user-profile" class="relative hidden">
        <button id="profile-btn" class="flex items-center bg-white bg-opacity-20 hover:bg-opacity-30 text-white px-3 py-1.5 rounded text-sm focus:outline-none transition duration-300">
          <img id="profile-avatar" src="" alt="头像" class="w-6 h-6 rounded-full mr-2">
          <span id="profile-username" class="text-sm"></span>
        </button>
        <div id="dropdown-menu" class="absolute right-0 mt-1 w-auto bg-white rounded shadow-lg hidden">
          <a href="upload.html" id="upload-btn" class="flex items-center px-4 py-2 text-gray-700 hover:bg-gray-100 transition text-sm whitespace-nowrap">上传图片</a>
          <a href="gallery.html" id="gallery-btn" class="flex items-center px-4 py-2 text-gray-700 hover:bg-gray-100 transition text-sm whitespace-nowrap">图片列表</a>
          <a href="profile.html" id="my-profile-btn" class="flex items-center px-4 py-2 text-gray-700 hover:bg-gray-100 transition text-sm whitespace-nowrap">个人信息</a>
          <button id="logout-btn" class="flex items-center w-full text-left px-4 py-2 text-red-500 hover:bg-gray-100 transition text-sm whitespace-nowrap">退出登录</button>
        </div>
      </div>
    </div>
  </header>

  <main class="flex-grow flex justify-center items-center p-8">
    <div id="profile-container" class="max-w-xl w-full p-6 rounded-xl shadow-md" style="background: rgba(0,0,0,0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);">
      <h2 class="text-2xl font-bold mb-6 text-white">个人资料</h2>
      <div id="profile-loading" class="text-center py-6">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-500 border-t-transparent"></div>
        <p class="text-gray-300 mt-2">加载中...</p>
      </div>
      <div id="profile-form" class="hidden">
        <div class="flex items-center space-x-4 mb-6">
          <img id="avatar-preview" src="" alt="头像" class="w-20 h-20 rounded-full border border-gray-500 object-cover">
          <div>
            <input type="file" id="avatar-input" accept="image/*" class="text-sm text-gray-300">
            <p class="text-xs text-gray-400 mt-1">点击上传新头像</p>
          </div>
        </div>
        <div class="mb-4">
          <label class="block text-gray-300 mb-1">昵称</label>
          <input id="username" type="text" class="w-full px-4 py-2 border border-gray-500 rounded-md bg-white bg-opacity-10 text-white focus:outline-none focus:ring focus:border-blue-400">
        </div>
        <div class="mb-4">
          <label class="block text-gray-300 mb-1">邮箱（不可更改）</label>
          <input id="email" type="email" disabled class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-md text-gray-300">
        </div>
        <div class="flex justify-between items-center">
          <button id="save-profile-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-md transition">保存</button>
          <span id="save-status" class="text-sm"></span>
        </div>
      </div>
    </div>
  </main>

  <div id="auth-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden">
    <div class="bg-white p-8 rounded-lg w-80 relative">
      <button id="close-auth-modal" class="absolute top-2 right-2 text-gray-500 hover:text-black">&times;</button>
      <h2 id="auth-title" class="text-2xl font-bold mb-6 text-center">登录</h2>
      <div id="login-form">
        <div class="flex flex-col space-y-4">
          <input type="email" id="login-email" placeholder="邮箱" class="border p-2 rounded" required>
          <input type="password" id="login-password" placeholder="密码" class="border p-2 rounded" required>
          <button id="login-button" class="bg-blue-600 text-white py-2 rounded hover:bg-blue-500">登录</button>
          <p class="text-center text-sm mt-2">没有账号？<a href="#" id="to-register" class="text-blue-600 hover:underline">注册</a></p>
        </div>
      </div>
      <div id="register-form" class="hidden">
        <div class="flex flex-col space-y-4">
          <input type="text" id="register-nickname" placeholder="昵称（可选）" class="border p-2 rounded">
          <input type="email" id="register-email" placeholder="邮箱" class="border p-2 rounded" required>
          <input type="password" id="register-password" placeholder="密码" class="border p-2 rounded" required>
          <button id="register-button" class="bg-blue-600 text-white py-2 rounded hover:bg-blue-500">注册</button>
          <p class="text-center text-sm mt-2">已有账号？<a href="#" id="to-login" class="text-blue-600 hover:underline">登录</a></p>
        </div>
      </div>
    </div>
  </div>


  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await new Promise(r => setTimeout(r, 300));
      const { data: { session } } = await supabase.auth.getSession();
      if (!session?.user) {
        document.getElementById('profile-container').innerHTML = '<p class="text-red-500 text-center py-10">⚠️ 请先登录</p>';
        return;
      }

      const user = session.user;
      const { data, error } = await supabase.from('profiles').select('username, avatar_url').eq('id', user.id).single();
      if (error) { console.error('加载用户资料失败', error); return; }

      const avatarUrl = data?.avatar_url || 'https://api.dicebear.com/7.x/bottts/png?seed=default';
      document.getElementById('avatar-preview').src = avatarUrl;
      document.getElementById('username').value = data?.username || '';
      document.getElementById('email').value = user.email;
      document.getElementById('profile-loading').classList.add('hidden');
      document.getElementById('profile-form').classList.remove('hidden');

      document.getElementById('avatar-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const ext = file.name.split('.').pop();
        const fileName = `${user.id}-avatar.${ext}`;
        const { error: upError } = await supabase.storage.from('avatars').upload(fileName, file, { upsert: true });
        if (upError) { alert('头像上传失败：' + upError.message); return; }
        const { data: urlData } = supabase.storage.from('avatars').getPublicUrl(fileName);
        const publicUrl = urlData.publicUrl;
        document.getElementById('avatar-preview').src = publicUrl;
        await supabase.from('profiles').update({ avatar_url: publicUrl }).eq('id', user.id);
      });

      document.getElementById('save-profile-btn').addEventListener('click', async () => {
        const username = document.getElementById('username').value.trim();
        const status = document.getElementById('save-status');
        const { error: updateError } = await supabase.from('profiles').update({ username }).eq('id', user.id);
        if (updateError) { status.textContent = '保存失败：' + updateError.message; status.className = 'text-sm text-red-500'; }
        else { status.textContent = '保存成功！'; status.className = 'text-sm text-green-500'; }
      });
    });
  </script>
</body>
</html>
