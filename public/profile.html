<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人资料 - NBVIL 图床</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="common.js" defer></script>
</head>
<body class="bg-cover bg-center bg-no-repeat font-sans flex flex-col min-h-screen" style="background-image: url('assets/background.jpeg');">

  <header class="bg-transparent text-white p-4">
    <div class="container mx-auto flex justify-between items-center">
      <a href="index.html" class="flex items-center space-x-2">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9.75L12 4l9 5.75v8.25a2.25 2.25 0 01-2.25 2.25h-2.25V15a2.25 2.25 0 00-2.25-2.25h-3A2.25 2.25 0 009.75 15v5.25H7.5A2.25 2.25 0 015.25 18V9.75z"></path></svg>
        <h1 class="text-2xl font-semibold">NBVIL 图床</h1>
      </a>
      <div id="user-status" class="flex items-center space-x-4">
        <button id="login-register-btn" class="bg-blue-500 bg-opacity-10 hover:bg-opacity-25 text-white px-4 py-2 rounded-md text-sm transition duration-300">登录/注册</button>
        <div id="user-profile" class="relative hidden">
          <button id="profile-btn" class="flex items-center bg-blue-500 bg-opacity-10 hover:bg-opacity-25 text-white px-4 py-2 rounded-md text-sm focus:outline-none transition duration-300">
            <img id="profile-avatar" src="" alt="头像" class="w-8 h-8 rounded-full mr-2">
            <span id="profile-username" class="text-sm"></span>
          </button>
          <div id="dropdown-menu" class="absolute right-0 mt-2 w-auto bg-white bg-opacity-30 backdrop-blur-md rounded-md shadow-lg hidden">
            <a href="upload.html" id="upload-btn" class="flex items-center px-4 py-2 text-gray-800 hover:bg-white hover:bg-opacity-40 transition-all duration-300 whitespace-nowrap">
              <svg class="w-5 h-5 mr-2 text-blue-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M16 8l-4-4m0 0L8 8m4-4v12"></path></svg>上传图片
            </a>
            <a href="gallery.html" id="gallery-btn" class="flex items-center px-4 py-2 text-gray-800 hover:bg-white hover:bg-opacity-40 transition-all duration-300 whitespace-nowrap">
              <svg class="w-5 h-5 mr-2 text-green-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>图片列表
            </a>
            <a href="profile.html" id="my-profile-btn" class="flex items-center px-4 py-2 text-gray-800 hover:bg-white hover:bg-opacity-40 transition-all duration-300 whitespace-nowrap">
              <svg class="w-5 h-5 mr-2 text-yellow-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>个人信息
            </a>
            <button id="logout-btn" class="flex items-center w-full text-left px-4 py-2 text-gray-800 hover:bg-white hover:bg-opacity-40 transition-all duration-300 whitespace-nowrap">
              <svg class="w-5 h-5 mr-2 text-red-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 11-6 0v-1"></path></svg>退出登录
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="flex-grow flex justify-center items-center p-8">
    <div id="profile-container" class="max-w-xl w-full bg-white bg-opacity-40 backdrop-blur p-6 rounded-xl shadow-md">
      <h2 class="text-2xl font-bold mb-6 text-gray-800">个人资料</h2>
      <div id="profile-loading" class="text-center py-6">
        <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-500 border-t-transparent"></div>
        <p class="text-gray-600 mt-2">加载中...</p>
      </div>
      <div id="profile-form" class="hidden">
        <div class="flex items-center space-x-4 mb-6">
          <img id="avatar-preview" src="" alt="头像" class="w-20 h-20 rounded-full border border-gray-300 object-cover">
          <div>
            <input type="file" id="avatar-input" accept="image/*" class="text-sm text-gray-600">
            <p class="text-xs text-gray-500 mt-1">点击上传新头像</p>
          </div>
        </div>
        <div class="mb-4">
          <label class="block text-gray-700 mb-1">昵称</label>
          <input id="username" type="text" class="w-full px-4 py-2 border rounded-md bg-white bg-opacity-60 focus:outline-none focus:ring focus:border-blue-300">
        </div>
        <div class="mb-4">
          <label class="block text-gray-700 mb-1">邮箱（不可更改）</label>
          <input id="email" type="email" disabled class="w-full px-4 py-2 bg-gray-100 border rounded-md text-gray-600">
        </div>
        <div class="flex justify-between items-center">
          <button id="save-profile-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-md transition">保存</button>
          <span id="save-status" class="text-sm"></span>
        </div>
      </div>
    </div>
  </main>

  <div id="auth-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden">
    <div class="bg-white p-8 rounded-lg w-80 relative">
      <button id="close-auth-modal" class="absolute top-2 right-2 text-gray-500 hover:text-black">&times;</button>
      <h2 id="auth-title" class="text-2xl font-bold mb-6 text-center">登录</h2>
      <div id="login-form">
        <div class="flex flex-col space-y-4">
          <input type="email" id="login-email" placeholder="邮箱" class="border p-2 rounded" required>
          <input type="password" id="login-password" placeholder="密码" class="border p-2 rounded" required>
          <button id="login-button" class="bg-blue-600 text-white py-2 rounded hover:bg-blue-500">登录</button>
          <p class="text-center text-sm mt-2">没有账号？<a href="#" id="to-register" class="text-blue-600 hover:underline">注册</a></p>
        </div>
      </div>
      <div id="register-form" class="hidden">
        <div class="flex flex-col space-y-4">
          <input type="text" id="register-nickname" placeholder="昵称（可选）" class="border p-2 rounded">
          <input type="email" id="register-email" placeholder="邮箱" class="border p-2 rounded" required>
          <input type="password" id="register-password" placeholder="密码" class="border p-2 rounded" required>
          <button id="register-button" class="bg-blue-600 text-white py-2 rounded hover:bg-blue-500">注册</button>
          <p class="text-center text-sm mt-2">已有账号？<a href="#" id="to-login" class="text-blue-600 hover:underline">登录</a></p>
        </div>
      </div>
    </div>
  </div>

  <footer class="bg-transparent text-white mt-auto py-6 text-sm">
    <div class="container mx-auto flex flex-col items-center space-y-4 px-4">
      <div class="text-center"><p>© 2025 NBVIL 图床. All rights reserved.</p></div>
      <div class="flex space-x-6">
        <a href="https://github.com/sindricn/ImageHost-R2" target="_blank" class="flex items-center space-x-1 hover:text-blue-400 transition"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.373 0 12a12 12 0 008.207 11.387c.6.11.793-.26.793-.577v-2.021c-3.338.727-4.042-1.415-4.042-1.415-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.239 1.839 1.239 1.07 1.834 2.807 1.304 3.492.997.108-.775.418-1.305.762-1.605-2.665-.303-5.467-1.334-5.467-5.931 0-1.31.468-2.382 1.236-3.222-.124-.303-.536-1.523.117-3.176 0 0 1.008-.323 3.3 1.23a11.49 11.49 0 013.003-.404c1.02.005 2.045.138 3.003.404 2.29-1.553 3.297-1.23 3.297-1.23.655 1.653.243 2.873.12 3.176.77.84 1.235 1.912 1.235 3.222 0 4.609-2.807 5.624-5.48 5.921.43.372.823 1.103.823 2.222v3.293c0 .32.192.694.801.576A12.002 12.002 0 0024 12c0-6.627-5.373-12-12-12z"/></svg><span>GitHub</span></a>
        <a href="mailto:nbvil.sindri@gmail.com" class="flex items-center space-x-1 hover:text-blue-400 transition"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2zm0 2v.01L12 13l8-6.99V6H4zm0 2.5v9.5h16v-9.5l-8 5-8-5z"/></svg><span>联系我们</span></a>
      </div>
    </div>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await new Promise(r => setTimeout(r, 300));
      const { data: { session } } = await supabase.auth.getSession();
      if (!session?.user) {
        document.getElementById('profile-container').innerHTML = '<p class="text-red-500 text-center py-10">⚠️ 请先登录</p>';
        return;
      }

      const user = session.user;
      const { data, error } = await supabase.from('profiles').select('username, avatar_url').eq('id', user.id).single();
      if (error) { console.error('加载用户资料失败', error); return; }

      const avatarUrl = data?.avatar_url || 'https://api.dicebear.com/7.x/bottts/png?seed=default';
      document.getElementById('avatar-preview').src = avatarUrl;
      document.getElementById('username').value = data?.username || '';
      document.getElementById('email').value = user.email;
      document.getElementById('profile-loading').classList.add('hidden');
      document.getElementById('profile-form').classList.remove('hidden');

      document.getElementById('avatar-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const ext = file.name.split('.').pop();
        const fileName = `${user.id}-avatar.${ext}`;
        const { error: upError } = await supabase.storage.from('avatars').upload(fileName, file, { upsert: true });
        if (upError) { alert('头像上传失败：' + upError.message); return; }
        const { data: urlData } = supabase.storage.from('avatars').getPublicUrl(fileName);
        const publicUrl = urlData.publicUrl;
        document.getElementById('avatar-preview').src = publicUrl;
        await supabase.from('profiles').update({ avatar_url: publicUrl }).eq('id', user.id);
      });

      document.getElementById('save-profile-btn').addEventListener('click', async () => {
        const username = document.getElementById('username').value.trim();
        const status = document.getElementById('save-status');
        const { error: updateError } = await supabase.from('profiles').update({ username }).eq('id', user.id);
        if (updateError) { status.textContent = '保存失败：' + updateError.message; status.className = 'text-sm text-red-500'; }
        else { status.textContent = '保存成功！'; status.className = 'text-sm text-green-500'; }
      });
    });
  </script>
</body>
</html>
