<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>图片画廊 - NBVIL 图床</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="common.js" defer></script>
</head>
<body class="bg-cover bg-center bg-no-repeat font-sans flex flex-col min-h-screen" style="background-image: url('assets/background.jpeg');">

  <!-- 右上角登录状态 -->
  <header class="fixed top-0 right-0 p-4 z-50">
    <div id="user-status" class="flex items-center space-x-2">
      <button id="login-register-btn" class="bg-white bg-opacity-20 hover:bg-opacity-30 text-white px-3 py-1.5 rounded text-sm transition duration-300">登录/注册</button>
      <div id="user-profile" class="relative hidden">
        <button id="profile-btn" class="flex items-center bg-white bg-opacity-20 hover:bg-opacity-30 text-white px-3 py-1.5 rounded text-sm focus:outline-none transition duration-300">
          <img id="profile-avatar" src="" alt="头像" class="w-6 h-6 rounded-full mr-2">
          <span id="profile-username" class="text-sm"></span>
        </button>
        <div id="dropdown-menu" class="absolute right-0 mt-1 w-auto bg-white rounded shadow-lg hidden">
          <a href="upload.html" id="upload-btn" class="flex items-center px-4 py-2 text-gray-700 hover:bg-gray-100 transition text-sm whitespace-nowrap">上传图片</a>
          <a href="gallery.html" id="gallery-btn" class="flex items-center px-4 py-2 text-gray-700 hover:bg-gray-100 transition text-sm whitespace-nowrap">图片列表</a>
          <a href="profile.html" id="my-profile-btn" class="flex items-center px-4 py-2 text-gray-700 hover:bg-gray-100 transition text-sm whitespace-nowrap">个人信息</a>
          <button id="logout-btn" class="flex items-center w-full text-left px-4 py-2 text-red-500 hover:bg-gray-100 transition text-sm whitespace-nowrap">退出登录</button>
        </div>
      </div>
    </div>
  </header>

  <main class="flex-grow flex justify-center p-8">
    <div class="w-full max-w-6xl">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-3xl font-bold text-white">🖼 图片画廊</h2>
        <button id="gallery-refresh-btn" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm transition">刷新</button>
      </div>
      <div id="gallery-loading" class="text-center py-10">
        <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-blue-500 border-t-transparent"></div>
        <p class="text-white mt-3">加载图片中...</p>
      </div>
      <div id="gallery-grid" class="gallery-grid hidden"></div>
      <div id="gallery-empty" class="text-center py-10 hidden">
        <p class="text-white text-lg">暂无图片</p>
      </div>
    </div>

    <div id="lightbox-overlay" class="lightbox-overlay hidden">
      <button id="lightbox-close" class="lightbox-close">&times;</button>
      <button id="lightbox-prev" class="lightbox-nav lightbox-prev">&#8249;</button>
      <button id="lightbox-next" class="lightbox-nav lightbox-next">&#8250;</button>
      <div class="lightbox-content">
        <img id="lightbox-img" src="" alt="" />
      </div>
      <div id="lightbox-info" class="lightbox-info"></div>
    </div>
  </main>

  <div id="auth-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden">
    <div class="bg-white p-8 rounded-lg w-80 relative">
      <button id="close-auth-modal" class="absolute top-2 right-2 text-gray-500 hover:text-black">&times;</button>
      <h2 id="auth-title" class="text-2xl font-bold mb-6 text-center">登录</h2>
      <div id="login-form">
        <div class="flex flex-col space-y-4">
          <input type="email" id="login-email" placeholder="邮箱" class="border p-2 rounded" required>
          <input type="password" id="login-password" placeholder="密码" class="border p-2 rounded" required>
          <button id="login-button" class="bg-blue-600 text-white py-2 rounded hover:bg-blue-500">登录</button>
          <p class="text-center text-sm mt-2">没有账号？<a href="#" id="to-register" class="text-blue-600 hover:underline">注册</a></p>
        </div>
      </div>
      <div id="register-form" class="hidden">
        <div class="flex flex-col space-y-4">
          <input type="text" id="register-nickname" placeholder="昵称（可选）" class="border p-2 rounded">
          <input type="email" id="register-email" placeholder="邮箱" class="border p-2 rounded" required>
          <input type="password" id="register-password" placeholder="密码" class="border p-2 rounded" required>
          <button id="register-button" class="bg-blue-600 text-white py-2 rounded hover:bg-blue-500">注册</button>
          <p class="text-center text-sm mt-2">已有账号？<a href="#" id="to-login" class="text-blue-600 hover:underline">登录</a></p>
        </div>
      </div>
    </div>
  </div>


  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await new Promise(r => setTimeout(r, 300));
      const session = await supabase.auth.getSession().then(r => r.data.session);
      if (!session) {
        document.getElementById('gallery-grid').innerHTML = '<p class="text-red-500 text-center py-10">⚠️ 请先登录后查看图片</p>';
        document.getElementById('gallery-grid').classList.remove('hidden');
        document.getElementById('gallery-loading').classList.add('hidden');
        return;
      }

      const config = window.IMG_BED_CONFIG || {};
      const apiBaseUrl = config.apiBaseUrl || window.location.origin;
      const imageListPath = config.imageListPath || "/list";

      let galleryImages = [];
      let currentIndex = 0;

      async function fetchImages() {
        const loadingEl = document.getElementById("gallery-loading");
        const gridEl = document.getElementById("gallery-grid");
        const emptyEl = document.getElementById("gallery-empty");
        loadingEl.classList.remove("hidden");
        gridEl.classList.add("hidden");
        emptyEl.classList.add("hidden");

        try {
          const fullUrl = `${apiBaseUrl.replace(/\/$/, '')}${imageListPath.startsWith('/') ? '' : '/'}${imageListPath}?format=json`;
          const res = await fetch(fullUrl);
          const data = await res.json();
          galleryImages = data.files || [];
          loadingEl.classList.add("hidden");
          if (galleryImages.length === 0) { emptyEl.classList.remove("hidden"); return; }
          gridEl.classList.remove("hidden");
          renderGallery(galleryImages);
        } catch (error) {
          loadingEl.classList.add("hidden");
          gridEl.innerHTML = `<p class="text-red-500 text-center py-10">加载失败：${error.message}</p>`;
          gridEl.classList.remove("hidden");
        }
      }

      function renderGallery(images) {
        const gridEl = document.getElementById("gallery-grid");
        gridEl.innerHTML = "";
        images.forEach((img, index) => {
          const card = document.createElement("div");
          card.className = "gallery-card";
          card.innerHTML = `
            <div class="gallery-thumb-wrapper">
              <img src="${img.url}" alt="${img.key}" class="gallery-thumb" loading="lazy" />
              <div class="gallery-overlay"><span class="gallery-zoom-icon">🔍</span></div>
            </div>
            <div class="gallery-card-info">
              <p class="gallery-card-name" title="${img.key}">${img.key}</p>
              <p class="gallery-card-size">${formatSize(img.size)}</p>
            </div>`;
          card.addEventListener("click", () => openLightbox(index));
          gridEl.appendChild(card);
        });
      }

      function formatSize(bytes) {
        if (!bytes) return "";
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / (1024 * 1024)).toFixed(1) + " MB";
      }

      function openLightbox(index) {
        currentIndex = index;
        const overlay = document.getElementById("lightbox-overlay");
        const img = document.getElementById("lightbox-img");
        const info = document.getElementById("lightbox-info");
        img.src = galleryImages[index].url;
        info.textContent = `${galleryImages[index].key} · ${formatSize(galleryImages[index].size)} · ${index + 1} / ${galleryImages.length}`;
        overlay.classList.remove("hidden");
        document.body.style.overflow = "hidden";
      }

      function closeLightbox() {
        document.getElementById("lightbox-overlay").classList.add("hidden");
        document.body.style.overflow = "";
      }

      function navigateLightbox(direction) {
        currentIndex = (currentIndex + direction + galleryImages.length) % galleryImages.length;
        document.getElementById("lightbox-img").src = galleryImages[currentIndex].url;
        document.getElementById("lightbox-info").textContent = `${galleryImages[currentIndex].key} · ${formatSize(galleryImages[currentIndex].size)} · ${currentIndex + 1} / ${galleryImages.length}`;
      }

      document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
      document.getElementById("lightbox-overlay").addEventListener("click", (e) => { if (e.target === e.currentTarget) closeLightbox(); });
      document.getElementById("lightbox-prev").addEventListener("click", (e) => { e.stopPropagation(); navigateLightbox(-1); });
      document.getElementById("lightbox-next").addEventListener("click", (e) => { e.stopPropagation(); navigateLightbox(1); });
      document.addEventListener("keydown", (e) => {
        const overlay = document.getElementById("lightbox-overlay");
        if (!overlay || overlay.classList.contains("hidden")) return;
        if (e.key === "Escape") closeLightbox();
        if (e.key === "ArrowLeft") navigateLightbox(-1);
        if (e.key === "ArrowRight") navigateLightbox(1);
      });
      document.getElementById("gallery-refresh-btn").addEventListener("click", fetchImages);
      await fetchImages();
    });
  </script>
</body>
</html>
