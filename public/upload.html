<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>上传图片 - NBVIL 图床</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="common.js" defer></script>
</head>
<body class="font-sans flex flex-col min-h-screen" style="background: linear-gradient(135deg, #1a1a2e 0%, #2d1b4e 30%, #6b2d5c 60%, #a8546e 85%, #d4827a 100%); background-attachment: fixed;">

  <!-- 右上角登录状态 -->
  <header class="fixed top-0 right-0 p-4 z-50">
    <div id="user-status" class="flex items-center space-x-2">
      <button id="login-register-btn" class="bg-white bg-opacity-20 hover:bg-opacity-30 text-white px-3 py-1.5 rounded text-sm transition duration-300">登录/注册</button>
      <div id="user-profile" class="relative hidden">
        <button id="profile-btn" class="flex items-center bg-white bg-opacity-20 hover:bg-opacity-30 text-white px-3 py-1.5 rounded text-sm focus:outline-none transition duration-300">
          <img id="profile-avatar" src="" alt="头像" class="w-6 h-6 rounded-full mr-2">
          <span id="profile-username" class="text-sm"></span>
        </button>
        <div id="dropdown-menu" class="absolute right-0 mt-1 w-auto bg-white rounded shadow-lg hidden">
          <a href="upload.html" id="upload-btn" class="flex items-center px-4 py-2 text-gray-700 hover:bg-gray-100 transition text-sm whitespace-nowrap">上传图片</a>
          <a href="gallery.html" id="gallery-btn" class="flex items-center px-4 py-2 text-gray-700 hover:bg-gray-100 transition text-sm whitespace-nowrap">图片列表</a>
          <a href="profile.html" id="my-profile-btn" class="flex items-center px-4 py-2 text-gray-700 hover:bg-gray-100 transition text-sm whitespace-nowrap">个人信息</a>
          <button id="logout-btn" class="flex items-center w-full text-left px-4 py-2 text-red-500 hover:bg-gray-100 transition text-sm whitespace-nowrap">退出登录</button>
        </div>
      </div>
    </div>
  </header>

  <main class="flex-grow flex justify-center items-center p-8">
    <div class="rounded-lg shadow-lg p-10 max-w-2xl w-full text-center" style="background: rgba(0,0,0,0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);">
      <h2 class="text-3xl font-bold mb-6 text-white">上传你的图片</h2>
      <form id="upload-form" class="space-y-6">
        <input type="file" id="file" name="file" multiple accept="image/*"
          class="w-full p-3 border-2 border-dashed border-gray-500 rounded-lg focus:outline-none focus:border-blue-400 text-white file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-sm file:bg-blue-600 file:text-white hover:file:bg-blue-500" />
        <label class="flex items-center justify-center space-x-2 text-sm text-gray-300 cursor-pointer select-none">
          <input type="checkbox" id="compress-checkbox" checked class="w-4 h-4 rounded accent-blue-500" />
          <span>自动压缩（WebP, 最大宽度 1920px）</span>
        </label>
        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-lg text-lg transition">开始上传</button>
      </form>
      <div id="upload-progress-container" style="display: none;" class="mt-6">
        <div class="w-full bg-gray-700 rounded-full h-4 overflow-hidden">
          <div id="upload-progress-bar" class="h-4 rounded-full transition-all duration-300 ease-out" style="width: 0%; background-color: #3b82f6;"></div>
        </div>
        <p id="upload-progress-text" class="text-sm text-gray-300 mt-2">0%</p>
      </div>
      <div id="result" class="mt-6 text-gray-200"></div>
    </div>
  </main>

  <div id="auth-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center hidden">
    <div class="bg-white p-8 rounded-lg w-80 relative">
      <button id="close-auth-modal" class="absolute top-2 right-2 text-gray-500 hover:text-black">&times;</button>
      <h2 id="auth-title" class="text-2xl font-bold mb-6 text-center">登录</h2>
      <div id="login-form">
        <div class="flex flex-col space-y-4">
          <input type="email" id="login-email" placeholder="邮箱" class="border p-2 rounded" required>
          <input type="password" id="login-password" placeholder="密码" class="border p-2 rounded" required>
          <button id="login-button" class="bg-blue-600 text-white py-2 rounded hover:bg-blue-500">登录</button>
          <p class="text-center text-sm mt-2">没有账号？<a href="#" id="to-register" class="text-blue-600 hover:underline">注册</a></p>
        </div>
      </div>
      <div id="register-form" class="hidden">
        <div class="flex flex-col space-y-4">
          <input type="text" id="register-nickname" placeholder="昵称（可选）" class="border p-2 rounded">
          <input type="email" id="register-email" placeholder="邮箱" class="border p-2 rounded" required>
          <input type="password" id="register-password" placeholder="密码" class="border p-2 rounded" required>
          <button id="register-button" class="bg-blue-600 text-white py-2 rounded hover:bg-blue-500">注册</button>
          <p class="text-center text-sm mt-2">已有账号？<a href="#" id="to-login" class="text-blue-600 hover:underline">登录</a></p>
        </div>
      </div>
    </div>
  </div>


  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await new Promise(r => setTimeout(r, 200));
      const session = await supabase.auth.getSession().then(r => r.data.session);
      if (!session) {
        document.getElementById('result').innerHTML = '⚠️ 请先登录后再上传图片';
        document.getElementById('upload-form').querySelector('button').disabled = true;
        return;
      }

      const config = window.IMG_BED_CONFIG || {};
      const apiBaseUrl = config.apiBaseUrl || window.location.origin;
      const MAX_FILES = config.maxFiles || 5;

      const fileInput = document.getElementById("file");
      const uploadForm = document.getElementById("upload-form");
      const resultDiv = document.getElementById("result");
      const progressBar = document.getElementById("upload-progress-bar");
      const progressText = document.getElementById("upload-progress-text");
      const progressContainer = document.getElementById("upload-progress-container");

      const MAX_WIDTH = 1920;
      const WEBP_QUALITY = 0.8;

      function formatSize(bytes) {
        if (!bytes) return "0 B";
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1048576) return (bytes / 1024).toFixed(1) + " KB";
        return (bytes / 1048576).toFixed(1) + " MB";
      }

      async function compressImage(file) {
        // GIF/SVG 保留原样
        if (file.type === 'image/gif' || file.type === 'image/svg+xml') return file;

        const img = new Image();
        const blobUrl = URL.createObjectURL(file);
        await new Promise((resolve, reject) => {
          img.onload = resolve;
          img.onerror = reject;
          img.src = blobUrl;
        });
        URL.revokeObjectURL(blobUrl);

        let { width, height } = img;
        if (width > MAX_WIDTH) {
          height = Math.round(height * (MAX_WIDTH / width));
          width = MAX_WIDTH;
        }

        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);

        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/webp', WEBP_QUALITY));
        if (blob.size >= file.size) return file;

        const origName = (file.name && file.name !== 'undefined') ? file.name : 'image.png';
        const extIndex = origName.lastIndexOf('.');
        const baseName = extIndex > 0 ? origName.slice(0, extIndex) : origName;
        return new File([blob], `${baseName}.webp`, { type: 'image/webp' });
      }

      uploadForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const files = fileInput.files;
        if (!files.length) return alert("请选择图片");
        if (files.length > MAX_FILES) return alert(`最多只能上传 ${MAX_FILES} 张图片`);

        const submitBtn = uploadForm.querySelector("button");
        submitBtn.disabled = true;

        const doCompress = document.getElementById("compress-checkbox").checked;

        // 压缩
        let totalOrigSize = 0, totalCompSize = 0;
        const uploadFiles = [];

        if (doCompress) {
          progressContainer.style.display = "block";
          progressBar.style.width = "0%";
          progressBar.style.backgroundColor = "#3b82f6";
          progressText.textContent = "压缩中...";
          submitBtn.textContent = "压缩中...";

          for (let i = 0; i < files.length; i++) {
            const origSize = files[i].size;
            totalOrigSize += origSize;
            progressText.textContent = `压缩中 ${i + 1}/${files.length}...`;
            const compressed = await compressImage(files[i]);
            totalCompSize += compressed.size;
            uploadFiles.push(compressed);
          }
        } else {
          uploadFiles.push(...files);
        }

        const saved = doCompress && totalOrigSize > 0 ? Math.round((1 - totalCompSize / totalOrigSize) * 100) : 0;
        const formData = new FormData();
        for (const file of uploadFiles) formData.append("file", file);

        resultDiv.innerHTML = "";
        progressContainer.style.display = "block";
        progressBar.style.width = "0%";
        progressText.textContent = doCompress && saved > 0 ? `已压缩 ${saved}% (${formatSize(totalOrigSize)} → ${formatSize(totalCompSize)}), 上传中...` : "上传中...";
        submitBtn.textContent = "上传中...";

        const xhr = new XMLHttpRequest();
        xhr.upload.addEventListener("progress", (e) => {
          if (e.lengthComputable) {
            const percent = Math.round((e.loaded / e.total) * 100);
            progressBar.style.width = percent + "%";
            progressText.textContent = percent + "%";
            if (percent >= 100) { progressBar.style.backgroundColor = "#22c55e"; progressText.textContent = "处理中..."; }
          }
        });
        xhr.addEventListener("load", () => {
          submitBtn.disabled = false; submitBtn.textContent = "开始上传";
          try {
            const data = JSON.parse(xhr.responseText);
            if (xhr.status >= 200 && xhr.status < 300 && data.urls && Array.isArray(data.urls)) {
              progressText.textContent = "上传完成 ✓";
              resultDiv.innerHTML = `<p class="text-green-600 font-semibold mb-4">✅ 上传成功，共 ${data.urls.length} 张</p>`;
              data.urls.forEach(url => {
                resultDiv.innerHTML += `<div class="mt-3 p-3 bg-gray-800 bg-opacity-50 rounded-lg"><p class="text-sm text-gray-300 break-all"><a href="${url}" target="_blank" class="text-blue-400 hover:underline">${url}</a></p><img src="${url}" class="mt-2 rounded shadow-sm" style="max-width:300px;max-height:200px;object-fit:contain;" /></div>`;
              });
            } else {
              progressBar.style.backgroundColor = "#ef4444"; progressText.textContent = "上传失败 ✗";
              resultDiv.innerHTML = `<p class="text-red-400">❌ 上传失败：${data.error || '未知错误'}</p>`;
            }
          } catch { progressBar.style.backgroundColor = "#ef4444"; progressText.textContent = "上传失败 ✗"; resultDiv.innerHTML = `<p class="text-red-400">❌ 解析响应出错</p>`; }
        });
        xhr.addEventListener("error", () => { submitBtn.disabled = false; submitBtn.textContent = "开始上传"; progressBar.style.backgroundColor = "#ef4444"; progressText.textContent = "上传失败 ✗"; resultDiv.innerHTML = `<p class="text-red-400">❌ 网络错误</p>`; });
        xhr.open("POST", `${apiBaseUrl}/upload`);
        xhr.setRequestHeader("Authorization", `Bearer ${session.access_token}`);
        xhr.send(formData);
      });
    });
  </script>
</body>
</html>
